<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 小玺AI</title>
<link rel="stylesheet" href="/static/css/design-system.css">
<style>
  body { background: var(--color-bg-page); }
</style>
</head>
<body class="auth-page">
<div class="auth-card animate-in">
  <div class="auth-logo">
    <div class="auth-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>小玺AI</h1>
    <p>产品详情页自动生成平台</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash-msg flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input type="text" name="username" class="form-input" placeholder="请输入用户名" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input type="password" name="password" class="form-input" placeholder="请输入密码" required>
    </div>
    <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top:8px">登 录</button>
  </form>

  <div class="auth-links">
    还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a>
  </div>
</div>
</body>
</html>
