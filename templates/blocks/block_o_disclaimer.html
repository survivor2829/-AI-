<!--
  block_o_disclaimer — 免责声明/温馨提示（末尾小字屏）
  宽度：750px

  变量：
  - disclaimer_title: 可选标题（默认"温馨提示"）
  - disclaimer_text: 免责声明正文
-->

<div style="width:750px; box-sizing:border-box; font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:#F3F4F6; color:#111827; padding:26px 32px;">
  <div style="border-radius:16px; border:1px solid rgba(17,24,39,0.10); background:#ffffff; padding:16px 16px 14px 16px;">
    <div style="display:flex; align-items:flex-start; gap:12px;">
      <div style="flex:0 0 30px; width:30px; height:30px; border-radius:12px; background:rgba(232,35,26,0.10); border:1px solid rgba(232,35,26,0.22); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; color:#B91C1C;">i</div>
      <div style="flex:1; min-width:0;">
        <div style="font-size:13px; font-weight:900; line-height:1.3;">{% if disclaimer_title %}{{ disclaimer_title }}{% else %}温馨提示{% endif %}</div>
        <div style="margin-top:6px; font-size:12px; line-height:1.8; color:rgba(17,24,39,0.72); white-space:pre-line;">{{ disclaimer_text }}</div>
      </div>
    </div>
  </div>
</div>
