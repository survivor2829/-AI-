<!--
  block_h_scene_grid — 适用场景/行业适配（场景卡片网格）
  宽度：750px

  变量：
  - section_title: 标题（如"适用场景"）
  - section_subtitle: 副标题（可空）
  - scenes: 场景列表（4-8项），每项：{"name":"医院", "desc":"低噪音，减少打扰", "image":"/path.jpg"}
-->

<div style="width:750px; box-sizing:border-box; font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:#0B0F1A; color:#fff; padding:44px 40px 46px 40px;">
  <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:12px;">
    <div style="min-width:0;">
      <div style="font-size:28px; font-weight:900; line-height:1.2;">{{ section_title }}</div>
      {% if section_subtitle %}<div style="margin-top:10px; font-size:14px; color:rgba(255,255,255,0.76); line-height:1.65;">{{ section_subtitle }}</div>{% endif %}
    </div>
    <div style="flex:0 0 auto; width:92px; height:6px; border-radius:999px; background:linear-gradient(90deg, #E8231A 0%, rgba(232,35,26,0.10) 100%);"></div>
  </div>

  <div style="margin-top:20px; display:flex; flex-wrap:wrap; gap:12px;">
    {% for s in scenes %}
    <div style="width:calc(50% - 6px); border-radius:18px; overflow:hidden; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.06);">
      <div style="height:160px; background:#111827; position:relative; overflow:hidden;">
        {% if s.image %}
        <img src="{{ s.image }}" alt="{{ s.name }}" style="width:100%; height:100%; object-fit:cover; display:block;" />
        {% else %}
        <div style="width:100%; height:100%; background:linear-gradient(135deg,#1a1d2e,#2a2d3e); display:flex; align-items:center; justify-content:center; font-size:36px; color:rgba(255,255,255,0.3);">{{ s.name[:1] }}</div>
        {% endif %}
        <div style="position:absolute; left:12px; top:12px; padding:8px 10px; border-radius:999px; background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.16); font-size:12px; font-weight:900;">{{ s.name }}</div>
      </div>
      <div style="padding:12px 12px 14px 12px;">
        <div style="font-size:13px; color:rgba(255,255,255,0.80); line-height:1.6;">{{ s.desc }}</div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
