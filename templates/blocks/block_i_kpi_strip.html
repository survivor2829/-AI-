<!--
  block_i_kpi_strip — KPI大数字条（效率与性能数据展示）
  宽度：750px

  变量：
  - section_title: 标题（如"效率与性能"）
  - kpis: 列表（3-6项），每项：{"label":"理论效率", "value":"3600", "unit":"m²/h", "note":"视工况而定"}
-->

<div style="width:750px; box-sizing:border-box; font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:#FFFFFF; color:#101828; padding:44px 40px 46px 40px;">
  <div style="font-size:28px; font-weight:900; line-height:1.2;">{{ section_title }}</div>
  <div style="margin-top:14px; height:2px; background:linear-gradient(90deg, #E8231A 0%, rgba(232,35,26,0.18) 75%, rgba(232,35,26,0.0) 100%);"></div>

  <div style="margin-top:18px; display:flex; flex-wrap:wrap; gap:12px;">
    {% for k in kpis %}
    <div style="width:calc(50% - 6px); border-radius:18px; border:1px solid #EAECF0; background:#F9FAFB; padding:16px 16px 14px 16px; box-sizing:border-box;">
      <div style="font-size:12px; color:#667085; font-weight:800; letter-spacing:0.3px;">{{ k.label }}</div>
      <div style="margin-top:8px; display:flex; align-items:baseline; gap:6px;">
        <div style="font-size:30px; font-weight:950; color:#101828; line-height:1;">{{ k.value }}</div>
        {% if k.unit %}<div style="font-size:12px; color:#475467; font-weight:900;">{{ k.unit }}</div>{% endif %}
      </div>
      {% if k.note %}<div style="margin-top:8px; font-size:12px; color:#98A2B3; line-height:1.5;">{{ k.note }}</div>{% endif %}
    </div>
    {% endfor %}
  </div>
</div>
